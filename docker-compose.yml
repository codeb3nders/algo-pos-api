version: '3.9'

services:
  # MongoDB service
  mongo_db:
    image: mongo:latest
    restart: always
    volumes:
      - mongo_db:/data/db
    ports:
      - 2717:27017  
  
  #Nestjs API service
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    ports:
      - 4000:4000
    volumes:
      - /app/node_modules
      - ./server:/app
    depends_on:
      - mongo_db
    environment:
      DATABASE_USER: test
      DATABASE_PASSWORD: test  
      DATABASE_HOST: mongo_db
      SECRET: SeCR3TK3YF0RAp1
      PORT: 4000
      ZEROPAD: 4
      DATABASE_PORT: 27017  

  # Angular client service
  #Nestjs API service
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    ports:
      - 3000:3000
    volumes:
      - /web/node_modules
      - ./client:/web
    depends_on:
      - api
    
  
volumes:
  mongo_db: {}  


 
